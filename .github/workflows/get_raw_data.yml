name: Get money bill's data

on:
  workflow_dispatch:
  schedule:
    - cron: '30 11 1,15 * *' 
  push:
    branches:
      - run-prefect-with-actions
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    #- uses: actions/checkout@v3
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      #uses: actions/setup-python@v4
      uses: actions/setup-python@v5
      with:
        python-version: 3.12
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        cache-suffix: "v2"
        version: "0.6.2"
    - name: Install the project
      run: uv sync --locked --all-extras --dev
    - name: 'Autenticación en Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'
    - name: Prefect Cloud login
      run: |
        uv run prefect config set PREFECT_API_KEY=${{secrets.PREFECT_API_KEY}} 
        uv run prefect cloud workspace set --workspace "${{secrets.PREFECT_WORKSPACE}}"      
    - name: Run money bill's scraper
      env:
          NUMISMATIC_BUCKET: ${{ secrets.NUMISMATIC_BUCKET }}
          NUMISMATIC_RAW: ${{ secrets.NUMISMATIC_RAW }}
      run: |
        uv run src/get_raw_data.py
        uv run src/clean_raw_data.py     
    - name: Instalar dbt-bigquery
      run: uv tool install dbt-core --with dbt-bigquery

    - name: Create Google credentials file
      run: |
        echo '${{ secrets.GCP_SA_KEY }}' > gcp-key.json

    - name: Configure dbt profile for CI
      run: |
        mkdir -p ~/.dbt
        echo "
        transform_numismatic:
          target: dev
          outputs:
            dev:
              type: bigquery
              method: service-account
              project: numismatic-analytics
              dataset: dbt_camila
              threads: 4
              keyfile: ${{ github.workspace }}/gcp-key.json
              location: US
        " > ~/.dbt/profiles.yml

    - name: Execute dbt transformations
      run: |
        cd transform_numismatic
        dbt deps
        dbt build
