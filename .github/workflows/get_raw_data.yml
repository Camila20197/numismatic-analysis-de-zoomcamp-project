name: Get money bill's data

on:
    workflow_dispatch:
 # schedule:
  #  - cron: '47,50,53 * * * *'
# on:
#   push:
#     branches:
#       - run-prefect-with-actions
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    #- uses: actions/checkout@v3
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      #uses: actions/setup-python@v4
      uses: actions/setup-python@v5
      with:
        python-version: 3.12
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        cache-suffix: "v2"
        version: "0.6.2"
    - name: Install the project
      run: uv sync --locked --all-extras --dev
    - name: 'Autenticación en Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'
    - name: Prefect Cloud login
      run: |
        uv run prefect config set PREFECT_API_KEY=${{secrets.PREFECT_API_KEY}} 
        uv run prefect cloud workspace set --workspace "${{secrets.PREFECT_WORKSPACE}}"      
    - name: Run money bill's scraper
      env:
          NUMISMATIC_BUCKET: ${{ secrets.NUMISMATIC_BUCKET }}
          NUMISMATIC_RAW: ${{ secrets.NUMISMATIC_RAW }}
          NUMISMATIC_CLEAN: ${{ secrets.NUMISMATIC_CLEAN }}
      run: |
        uv run src/get_raw_data.py
        uv run src/clean_raw_data.py
